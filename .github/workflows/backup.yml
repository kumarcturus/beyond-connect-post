name: Backup Redis Metadata

on:
  schedule:
    # 毎週月曜 UTC 0:00 (JST 月曜 9:00)
    - cron: "0 0 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Run backup
        env:
          REDIS_URL: ${{ secrets.REDIS_URL }}
        run: node scripts/backup-redis.mjs

      - name: Commit backup if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet backups/; then
            echo "変更なし — コミットスキップ"
          else
            git add backups/
            git commit -m "chore: weekly Redis metadata backup ($(date -u +%Y-%m-%d))"
            git push
          fi
